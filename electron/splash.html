<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09090b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      -webkit-app-region: drag;
      overflow: hidden;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: rgba(20,184,166,0.15);
      border: 1px solid rgba(20,184,166,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    .logo svg { width: 40px; height: 40px; }
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #fff;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.2px;
    }
    .bar-wrap {
      margin-top: 32px;
      width: 160px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    .bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #14b8a6, #8b5cf6);
      border-radius: 99px;
      animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(20,184,166,0.15); }
      50% { box-shadow: 0 0 24px 6px rgba(20,184,166,0.2); }
    }
    @keyframes slide {
      0%   { transform: translateX(-160px); }
      100% { transform: translateX(400px); }
    }
  </style>
</head>
<body>
  <div class="logo">
    <!-- Lightning bolt / aura icon -->
    <svg viewBox="0 0 48 46" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z" fill="#14b8a6"/>
    </svg>
  </div>
  <h1>Aura Context</h1>
  <span class="sub">Starting up…</span>
  <div class="bar-wrap"><div class="bar"></div></div>
</body>
</html>
